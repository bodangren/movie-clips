<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .number-badge {
            font-size: 150px;
            font-weight: 900;
            background: #e94560;
            width: 250px;
            height: 250px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 80px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .trivia-text {
            font-size: 52px;
            font-weight: 600;
            line-height: 1.3;
            max-width: 900px;
            padding: 0 40px;
            margin-bottom: 100px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .movie-title {
            font-size: 40px;
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255, 255, 255, 0.6);
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            padding-top: 40px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="number-badge">{{number}}</div>
    <div class="trivia-text">{{text}}</div>
    <div class="movie-title">—— {{movie}} ({{year}}) ——</div>
</body>
</html>
