<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bg)"/>
  
  <!-- Film strip left -->
  <rect x="96" y="140" width="24" height="232" rx="4" fill="#0f3460"/>
  <rect x="96" y="156" width="24" height="16" rx="2" fill="#1a1a2e"/>
  <rect x="96" y="196" width="24" height="16" rx="2" fill="#1a1a2e"/>
  <rect x="96" y="236" width="24" height="16" rx="2" fill="#1a1a2e"/>
  <rect x="96" y="276" width="24" height="16" rx="2" fill="#1a1a2e"/>
  <rect x="96" y="316" width="24" height="16" rx="2" fill="#1a1a2e"/>
  <rect x="96" y="356" width="24" height="16" rx="2" fill="#1a1a2e"/>
  
  <!-- Film strip right -->
  <rect x="392" y="140" width="24" height="232" rx="4" fill="#0f3460"/>
  <rect x="392" y="156" width="24" height="16" rx="2" fill="#1a1a2e"/>
  <rect x="392" y="196" width="24" height="16" rx="2" fill="#1a1a2e"/>
  <rect x="392" y="236" width="24" height="16" rx="2" fill="#1a1a2e"/>
  <rect x="392" y="276" width="24" height="16" rx="2" fill="#1a1a2e"/>
  <rect x="392" y="316" width="24" height="16" rx="2" fill="#1a1a2e"/>
  <rect x="392" y="356" width="24" height="16" rx="2" fill="#1a1a2e"/>
  
  <!-- Main film frame -->
  <rect x="120" y="140" width="272" height="232" rx="8" fill="#0f3460"/>
  
  <!-- Play button triangle -->
  <polygon points="230,196 230,316 318,256" fill="url(#accent)"/>
  
  <!-- Scissors hint (top right) -->
  <circle cx="356" cy="172" r="16" fill="#e94560" opacity="0.8"/>
  <line x1="348" y1="164" x2="364" y2="180" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
  <line x1="364" y1="164" x2="348" y2="180" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
</svg>